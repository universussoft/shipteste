<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>OceanVast — Frota Naval</title>
<meta http-equiv="Cache-Control" content="no-store">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,200;0,300;0,400;0,600;0,700;1,300&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent: #00d4ff;
  --deep:   #03060c;
  --silver: #7a9ab8;
  --white:  #eef3f8;
  --border: rgba(0,212,255,.12);
  --nav-h:  56px;
  --ctrl-h: 68px;
  --slide-dur: 20s;
}

html, body {
  width: 100%; height: 100%;
  background: var(--deep);
  overflow: hidden;
}

/* ── NAV ─────────────────────────────────────────────────────── */
#nav {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--nav-h); z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px;
  background: rgba(3,6,12,.97);
  border-bottom: 1px solid rgba(0,212,255,.1);
}
.logo {
  font-family: 'Bebas Neue'; font-size: 1.7rem; letter-spacing: .18em;
  color: var(--accent); text-shadow: 0 0 20px rgba(0,212,255,.4);
}
.nav-links { display: flex; gap: 24px; }
.nav-links a {
  font-family: 'Barlow Condensed'; font-size: .72rem; letter-spacing: .18em;
  color: rgba(122,154,184,.55); text-decoration: none; transition: color .2s;
}
.nav-links a:hover, .nav-links a.active { color: var(--accent); }
.nav-right {
  font-family: 'Barlow Condensed'; font-size: .68rem; letter-spacing: .12em;
  color: rgba(122,154,184,.3);
}

/* ── DESKTOP LAYOUT: side by side ───────────────────────────── */
#stage {
  position: fixed;
  top: var(--nav-h); left: 0; right: 0;
  bottom: var(--ctrl-h);
  display: flex;
  flex-direction: row;
}

/* ── 3D VIEW ─────────────────────────────────────────────────── */
#view {
  flex: 1;
  position: relative;
  overflow: hidden;
  min-width: 0;
}
#canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%; display: block;
}

/* Loading */
#load-overlay {
  position: absolute; inset: 0; z-index: 4;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px;
  background: var(--deep);
  transition: opacity .5s ease;
}
#load-overlay.fade { opacity: 0; pointer-events: none; }
.load-ship-name {
  font-family: 'Bebas Neue'; font-size: 2.6rem; letter-spacing: .12em;
  color: var(--accent); opacity: .3;
}
.load-bar { width: 140px; height: 1px; background: rgba(255,255,255,.08); overflow: hidden; }
.load-fill { height: 100%; background: var(--accent); width: 0%; transition: width .2s; }
.load-pct {
  font-family: 'Barlow Condensed'; font-size: .68rem; letter-spacing: .14em;
  color: rgba(122,154,184,.4);
}

/* Veil transition */
#veil {
  position: absolute; inset: 0; z-index: 3;
  background: var(--deep);
  opacity: 0; pointer-events: none;
  transition: opacity .45s ease;
}
#veil.show { opacity: 1; }

/* Watermark */
#canvas-label {
  position: absolute; bottom: 20px; left: 24px; z-index: 2;
  pointer-events: none;
}
.canvas-num {
  font-family: 'Barlow Condensed'; font-size: .65rem; letter-spacing: .25em;
  color: rgba(0,212,255,.22); margin-bottom: 3px;
}
.canvas-name {
  font-family: 'Bebas Neue'; font-size: 4rem; letter-spacing: .07em;
  color: rgba(255,255,255,.05); line-height: 1;
}

/* ── INFO PANEL ──────────────────────────────────────────────── */
#info {
  width: 400px;
  flex-shrink: 0;
  background: rgba(4,7,14,.88);
  border-left: 1px solid var(--border);
  backdrop-filter: blur(10px);
  display: flex; flex-direction: column;
  overflow: hidden;
}
#info-inner {
  flex: 1; display: flex; flex-direction: column;
  padding: 26px 22px 18px;
  overflow: hidden;
  transition: opacity .35s, transform .35s;
}
#info-inner.exit  { opacity: 0; transform: translateY(10px); }
#info-inner.enter { opacity: 0; transform: translateY(-8px); }

.info-idx {
  font-family: 'Barlow Condensed'; font-size: .62rem; letter-spacing: .28em;
  color: rgba(0,212,255,.4); margin-bottom: 8px;
  display: flex; align-items: center; gap: 10px;
}
.info-idx-line { flex: 1; height: 1px; background: var(--border); }

.info-name {
  font-family: 'Bebas Neue'; font-size: 2.4rem; letter-spacing: .07em;
  color: var(--white); line-height: 1; margin-bottom: 3px;
}
.info-sub {
  font-family: 'Barlow Condensed'; font-size: .8rem; letter-spacing: .13em;
  color: var(--accent); font-weight: 300; margin-bottom: 14px;
}
.divider { height: 1px; background: var(--border); margin-bottom: 12px; }
.info-desc {
  font-family: 'Barlow'; font-weight: 300; font-size: .8rem;
  line-height: 1.7; color: rgba(165,190,210,.65);
  margin-bottom: 14px;
  display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden;
}
.specs-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
  background: rgba(0,212,255,.06); margin-bottom: 12px; flex-shrink: 0;
}
.spec-cell { padding: 8px 10px; background: rgba(4,8,16,.92); }
.spec-k {
  font-family: 'Barlow Condensed'; font-size: .58rem; letter-spacing: .2em;
  color: var(--silver); margin-bottom: 2px; opacity: .7;
}
.spec-v {
  font-family: 'Barlow Condensed'; font-size: .88rem; font-weight: 600;
  color: var(--white); letter-spacing: .04em;
}
.status-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-shrink: 0;
}
.status-dot {
  width: 6px; height: 6px; border-radius: 50%; background: #2aff8f;
  animation: blink 2.5s infinite; flex-shrink: 0;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
.status-txt {
  font-family: 'Barlow Condensed'; font-size: .7rem; letter-spacing: .13em;
  color: rgba(42,255,143,.65);
}
.cta {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 15px; border: 1px solid rgba(0,212,255,.28);
  color: var(--accent); text-decoration: none;
  font-family: 'Barlow Condensed'; font-size: .76rem; letter-spacing: .17em;
  background: none; transition: .2s; margin-top: auto; flex-shrink: 0;
}
.cta:hover { background: rgba(0,212,255,.07); border-color: var(--accent); }
.cta-arrow { transition: transform .2s; }
.cta:hover .cta-arrow { transform: translateX(4px); }

/* ── CONTROLS BAR ────────────────────────────────────────────── */
#ctrl {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--ctrl-h);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  background: rgba(3,6,12,.97);
  border-top: 1px solid rgba(0,212,255,.08);
  z-index: 50;
}
.ship-dots { display: flex; align-items: center; gap: 8px; }
.ship-dot {
  width: 30px; height: 30px; border-radius: 50%;
  border: 1px solid rgba(0,212,255,.22);
  background: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Barlow Condensed'; font-size: .68rem;
  color: rgba(122,154,184,.45); transition: .2s;
}
.ship-dot:hover { border-color: var(--accent); color: var(--accent); }
.ship-dot.active { border-color: var(--accent); background: rgba(0,212,255,.12); color: var(--accent); }
.timer-wrap { flex: 1; display: flex; align-items: center; gap: 10px; padding: 0 20px; }
.timer-label {
  font-family: 'Barlow Condensed'; font-size: .62rem; letter-spacing: .17em;
  color: rgba(122,154,184,.3); flex-shrink: 0;
}
.timer-track { flex: 1; height: 1px; background: rgba(0,212,255,.1); position: relative; }
.timer-fill { position: absolute; inset: 0; background: var(--accent); width: 0%; }
.timer-fill.running { animation: timer-run var(--slide-dur) linear forwards; }
@keyframes timer-run { from{width:0%} to{width:100%} }
.play-btn {
  background: none; border: 1px solid rgba(0,212,255,.18);
  color: rgba(122,154,184,.55); padding: 6px 13px;
  font-family: 'Barlow Condensed'; font-size: .7rem; letter-spacing: .13em;
  cursor: pointer; transition: .2s;
}
.play-btn:hover { border-color: var(--accent); color: var(--accent); }
.ctrl-label {
  font-family: 'Barlow Condensed'; font-size: .64rem; letter-spacing: .1em;
  color: rgba(122,154,184,.25);
}

/* ── MOBILE ──────────────────────────────────────────────────── */
@media (max-width: 700px) {
  :root { --nav-h: 50px; --ctrl-h: 60px; }

  /* Nav: logo only */
  .nav-links, .nav-right { display: none; }
  #nav { padding: 0 18px; }
  .logo { font-size: 1.45rem; }

  /* Stage: vertical stack */
  #stage {
    flex-direction: column;
    top: var(--nav-h);
    bottom: var(--ctrl-h);
  }

  /* 3D: fixed height */
  #view { flex: 0 0 42vh; }

  /* Info: scrollable below */
  #info {
    flex: 1;
    width: 100%;
    border-left: none;
    border-top: 1px solid var(--border);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  #info-inner {
    overflow: visible;
    padding: 16px 16px 12px;
  }

  /* Typography adjustments */
  .info-name { font-size: 1.9rem; }
  .info-sub  { font-size: .74rem; margin-bottom: 10px; }
  .info-desc { font-size: .78rem; -webkit-line-clamp: 3; margin-bottom: 10px; }
  .canvas-name { font-size: 2rem; }

  /* Specs: smaller cells */
  .specs-grid { margin-bottom: 10px; }
  .spec-cell  { padding: 7px 8px; }
  .spec-v     { font-size: .82rem; }

  /* Controls: tighter */
  #ctrl { padding: 0 14px; gap: 8px; }
  .ship-dot  { width: 28px; height: 28px; }
  .timer-wrap { padding: 0 10px; }
  .play-btn  { padding: 5px 10px; font-size: .66rem; }
  .ctrl-label { display: none; }
  .timer-label { display: none; }
}

@media (max-width: 380px) {
  #view { flex: 0 0 38vh; }
  .info-name { font-size: 1.6rem; }
  .specs-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- NAV -->
<div id="nav">
  <div class="logo">OceanVast</div>
  <div class="nav-links">
    <a href="#" class="active">FROTA</a>
    <a href="#">ROTAS</a>
    <a href="#">OPERAÇÕES</a>
    <a href="#">CONTACTO</a>
  </div>
  <div class="nav-right">NAVEGAÇÃO AVANÇADA · DESDE 1987</div>
</div>

<!-- STAGE -->
<div id="stage">
  <div id="view">
    <canvas id="canvas"></canvas>
    <div id="load-overlay">
      <div class="load-ship-name" id="load-name">—</div>
      <div class="load-bar"><div class="load-fill" id="load-fill"></div></div>
      <div class="load-pct" id="load-pct">0%</div>
    </div>
    <div id="veil"></div>
    <div id="canvas-label">
      <div class="canvas-num" id="canvas-num">NAVIO 01</div>
      <div class="canvas-name" id="canvas-name">—</div>
    </div>
  </div>

  <div id="info">
    <div id="info-inner"></div>
  </div>
</div>

<!-- CONTROLS -->
<div id="ctrl">
  <div class="ship-dots" id="ship-dots"></div>
  <div class="timer-wrap">
    <span class="timer-label">PRÓXIMO</span>
    <div class="timer-track"><div class="timer-fill" id="timer-fill"></div></div>
  </div>
  <button class="play-btn" id="play-btn" onclick="togglePlay()">⏸ PAUSA</button>
  <div class="ctrl-label" id="ctrl-label">FROTA · 3 NAVIOS</div>
</div>

<script type="module">
import * as THREE from './three.module.js';
import { OBJLoader } from './OBJLoader.module.js';
import { MTLLoader } from './MTLLoader.module.js';

// ── RENDERER (single, persistent) ────────────────────────────────
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.setClearColor(0x03060c);

// ── SCENE ────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x03060c, 0.003);
const camera = new THREE.PerspectiveCamera(45, 1, 0.5, 3000);

scene.add(new THREE.AmbientLight(0x304060, 2));
const sun = new THREE.DirectionalLight(0xfff4d6, 3.2);
sun.position.set(80, 120, 60);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.left = sun.shadow.camera.bottom = -180;
sun.shadow.camera.right = sun.shadow.camera.top = 180;
scene.add(sun);
const fill = new THREE.DirectionalLight(0x2060a0, 1.0);
fill.position.set(-80, 30, -60);
scene.add(fill);
const rim = new THREE.DirectionalLight(0x00d4ff, 0.4);
rim.position.set(0, -20, -120);
scene.add(rim);

// Water
const waterGeo = new THREE.PlaneGeometry(900, 900, 32, 32);
const water = new THREE.Mesh(waterGeo, new THREE.MeshStandardMaterial({
  color: 0x053050, roughness: 0.25, metalness: 0.45, transparent: true, opacity: 0.88
}));
water.rotation.x = -Math.PI / 2;
scene.add(water);

const shipGroup = new THREE.Group();
scene.add(shipGroup);

// ── RESIZE ───────────────────────────────────────────────────────
function resize() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if (!w || !h) return;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h, false);
}
window.addEventListener('resize', resize);

// ── RENDER LOOP ──────────────────────────────────────────────────
let wt = 0;
(function loop() {
  requestAnimationFrame(loop);
  wt += 0.0008;
  const pos = waterGeo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    pos.setY(i,
      Math.sin(pos.getX(i) * 0.042 + wt * 2.2) * 0.5 +
      Math.sin(pos.getZ(i) * 0.058 + wt * 1.6) * 0.32
    );
  }
  pos.needsUpdate = true;
  waterGeo.computeVertexNormals();
  shipGroup.rotation.y += 0.0009;
  renderer.render(scene, camera);
})();

// ── SLIDESHOW ────────────────────────────────────────────────────
let ships = [], current = 0, playing = true, slideTimer = null;
const SLIDE_MS = 20000;

async function init() {
  ships = await fetch('/api/ships').then(r => r.json());
  document.getElementById('ctrl-label').textContent = `FROTA · ${ships.length} NAVIOS`;
  buildDots();
  resize();
  goTo(0);
}

function buildDots() {
  const el = document.getElementById('ship-dots');
  el.innerHTML = '';
  ships.forEach((s, i) => {
    const b = document.createElement('button');
    b.className = 'ship-dot'; b.textContent = String(i+1).padStart(2,'0'); b.title = s.name;
    b.addEventListener('click', () => goTo(i));
    el.appendChild(b);
  });
}

function setActiveDot(i) {
  document.querySelectorAll('.ship-dot').forEach((d, j) => d.classList.toggle('active', j === i));
}

function resetTimer() {
  clearTimeout(slideTimer);
  const fill = document.getElementById('timer-fill');
  fill.classList.remove('running');
  void fill.offsetWidth;
  if (playing) {
    fill.classList.add('running');
    slideTimer = setTimeout(() => goTo((current + 1) % ships.length), SLIDE_MS);
  }
}

window.togglePlay = () => {
  playing = !playing;
  document.getElementById('play-btn').textContent = playing ? '⏸ PAUSA' : '▶ PLAY';
  playing ? resetTimer() : (clearTimeout(slideTimer), document.getElementById('timer-fill').classList.remove('running'));
};

function goTo(idx) {
  current = idx;
  setActiveDot(idx);
  const ship = ships[idx];

  document.getElementById('canvas-num').textContent = `NAVIO ${String(idx+1).padStart(2,'0')} / ${String(ships.length).padStart(2,'0')}`;
  document.getElementById('canvas-name').textContent = ship.name.toUpperCase();

  const inner = document.getElementById('info-inner');
  inner.classList.add('exit');
  setTimeout(() => {
    renderPanel(ship, idx);
    inner.classList.remove('exit');
    inner.classList.add('enter');
    requestAnimationFrame(() => inner.classList.remove('enter'));
  }, 300);

  const veil = document.getElementById('veil');
  veil.classList.add('show');
  setTimeout(() => { loadShip(ship); veil.classList.remove('show'); }, 350);

  resetTimer();
}

function renderPanel(ship, idx) {
  const specs = Object.entries(ship.specs || {}).slice(0, 6);
  const specsHtml = specs.map(([k,v]) =>
    `<div class="spec-cell"><div class="spec-k">${k.toUpperCase()}</div><div class="spec-v">${v}</div></div>`
  ).join('');
  document.getElementById('info-inner').innerHTML = `
    <div class="info-idx">
      <span>${String(idx+1).padStart(2,'0')} / ${String(ships.length).padStart(2,'0')}</span>
      <div class="info-idx-line"></div>
      <span>${ship.flag||'PT'} · IMO ${ship.imo||'—'}</span>
    </div>
    <div class="info-name">${ship.name}</div>
    <div class="info-sub">${ship.subtitle||''}</div>
    <div class="divider"></div>
    <div class="info-desc">${ship.description||''}</div>
    <div class="specs-grid">${specsHtml}</div>
    <div class="status-row">
      <div class="status-dot"></div>
      <div class="status-txt">${ship.status||'EM SERVIÇO'}</div>
    </div>
    <a class="cta" href="viewer.html?ship=${ship._folder}">
      <span>EXPLORAR MODELO 3D</span><span class="cta-arrow">→</span>
    </a>`;
}

// ── LOAD SHIP ────────────────────────────────────────────────────
let loadGen = 0;

function setProg(p) {
  document.getElementById('load-fill').style.width = p + '%';
  document.getElementById('load-pct').textContent = Math.round(p) + '%';
}

function loadShip(ship) {
  const gen = ++loadGen;
  while (shipGroup.children.length) {
    const c = shipGroup.children[0];
    c.traverse(x => { if (x.isMesh) x.geometry.dispose(); });
    shipGroup.remove(c);
  }

  const m = ship.model || {};
  shipGroup.rotation.y = m.rotationOffset || 0;

  const radius = m.cameraRadius || 200;
  const tgt = new THREE.Vector3(...(m.cameraTarget || [0, 20, 0]));
  const pitch = m.cameraPitch || 0.28;
  camera.position.set(tgt.x, tgt.y + radius * Math.sin(pitch), tgt.z + radius * Math.cos(pitch));
  camera.lookAt(tgt);
  resize();

  document.getElementById('load-name').textContent = ship.name;
  document.getElementById('load-overlay').classList.remove('fade');
  setProg(0);

  const folder = ship._folder, objFile = m.obj || 'model.obj', mtlFile = m.mtl;

  function place(obj) {
    if (gen !== loadGen) return;
    obj.traverse(c => {
      if (!c.isMesh) return;
      const ms = Array.isArray(c.material) ? c.material : [c.material];
      ms.forEach(mat => { mat.transparent = false; mat.opacity = 1; mat.depthWrite = true; mat.needsUpdate = true; });
      c.castShadow = c.receiveShadow = true;
    });
    const box = new THREE.Box3().setFromObject(obj);
    const cen = box.getCenter(new THREE.Vector3());
    obj.position.set(-cen.x, -box.min.y, -cen.z);
    shipGroup.add(obj);
    setTimeout(() => document.getElementById('load-overlay').classList.add('fade'), 300);
  }

  function fallback() {
    if (gen !== loadGen) return;
    const ol = new OBJLoader();
    ol.setPath(`/${folder}/`);
    ol.load(objFile, obj => {
      if (gen !== loadGen) return;
      const pal = [0xd0d8e0, 0x2a3a4a, 0x8090a0, 0xc03030, 0x505860, 0x203040];
      let i = 0;
      obj.traverse(c => { if (c.isMesh) c.material = new THREE.MeshStandardMaterial({ color: pal[i++%pal.length], roughness:.55, metalness:.3 }); });
      place(obj);
    }, xhr => { if (gen===loadGen && xhr.total) setProg(35 + (xhr.loaded/xhr.total)*60); });
  }

  if (mtlFile) {
    setProg(5);
    const ml = new MTLLoader(); ml.setPath(`/${folder}/`);
    ml.load(mtlFile, mats => {
      if (gen !== loadGen) return;
      mats.preload(); setProg(30);
      const ol = new OBJLoader(); ol.setMaterials(mats); ol.setPath(`/${folder}/`);
      ol.load(objFile,
        obj => { if (gen!==loadGen) return; setProg(98); place(obj); },
        xhr => { if (gen===loadGen && xhr.total) setProg(30 + (xhr.loaded/xhr.total)*66); },
        () => fallback()
      );
    }, null, () => fallback());
  } else {
    fallback();
  }
}

init();
</script>
</body>
</html>
