<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Visualizador 3D · OceanVast</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500&family=Barlow+Condensed:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#080c12;--accent:#00d4ff;--silver:#8fa8c2;--white:#f0f5fa;--border:rgba(0,212,255,.14)}
html,body{width:100%;height:100%;overflow:hidden;background:var(--ink);color:var(--white);font-family:'Barlow',sans-serif}
#app{width:100vw;height:100vh;display:grid;grid-template-rows:64px 1fr 80px;grid-template-columns:1fr 300px;grid-template-areas:"tb tb" "vw sb" "ct ct"}

/* TOP BAR */
#tb{grid-area:tb;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:rgba(8,12,18,.98);border-bottom:1px solid var(--border);z-index:10}
.logo{font-family:'Bebas Neue';font-size:1.5rem;letter-spacing:.12em;color:var(--accent)}
.tb-ship{display:flex;align-items:center;gap:14px}
.tb-name{font-family:'Bebas Neue';font-size:1.25rem;letter-spacing:.1em;color:var(--white)}
.tb-sub{font-family:'Barlow Condensed';font-size:.8rem;font-weight:300;letter-spacing:.1em;color:var(--silver)}
.back-btn{font-family:'Barlow Condensed';font-size:.8rem;letter-spacing:.12em;color:var(--silver);background:none;border:1px solid rgba(0,212,255,.25);padding:6px 16px;cursor:pointer;transition:.2s;text-decoration:none;display:flex;align-items:center;gap:6px}
.back-btn:hover{color:var(--accent);border-color:var(--accent)}

/* VIEWER */
#vw{grid-area:vw;position:relative;overflow:hidden}
#canvas{width:100%;height:100%;display:block;touch-action:none}
#loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:var(--ink);z-index:5;transition:opacity .4s}
#loading.hidden{opacity:0;pointer-events:none}
.load-lbl{font-family:'Barlow Condensed';letter-spacing:.15em;font-size:.78rem;color:var(--silver)}
#prog-bar{width:200px;height:1px;background:rgba(255,255,255,.1);overflow:hidden}
#prog-fill{height:100%;background:var(--accent);width:0%;transition:width .3s}
#load-pct{font-family:'Barlow Condensed';font-size:.72rem;letter-spacing:.1em;color:rgba(143,168,194,.45)}
#hs-layer{position:absolute;inset:0;pointer-events:none;z-index:4}

/* HOTSPOTS */
.hs-dot{position:absolute;width:36px;height:36px;transform:translate(-50%,-50%);cursor:pointer;pointer-events:auto}
.hs-ring{width:36px;height:36px;border-radius:50%;border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:.95rem;background:rgba(0,212,255,.1);animation:hs-pulse 2.4s ease-in-out infinite;transition:background .2s,transform .2s}
.hs-dot:hover .hs-ring{background:rgba(0,212,255,.28);transform:scale(1.2);animation:none}
@keyframes hs-pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,212,255,.6)}55%{box-shadow:0 0 0 10px rgba(0,212,255,0)}}
.hs-tip{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);white-space:nowrap;background:rgba(8,12,18,.94);border:1px solid rgba(0,212,255,.35);padding:4px 12px;font-family:'Barlow Condensed';font-size:.74rem;letter-spacing:.1em;color:var(--accent);opacity:0;transition:opacity .2s;pointer-events:none}
.hs-dot:hover .hs-tip{opacity:1}

/* SIDEBAR */
#sb{grid-area:sb;background:rgba(6,10,18,.97);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:18px 18px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-title{font-family:'Bebas Neue';font-size:.95rem;letter-spacing:.15em;color:var(--silver);margin-bottom:2px}
.sb-count{font-family:'Barlow Condensed';font-size:.7rem;letter-spacing:.12em;color:rgba(143,168,194,.45)}
#hs-list{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:5px}
.hs-item{padding:10px 12px;border:1px solid rgba(0,212,255,.1);cursor:pointer;transition:.2s;display:flex;align-items:center;gap:10px}
.hs-item:hover,.hs-item.active{border-color:var(--accent);background:rgba(0,212,255,.06)}
.hs-item-icon{font-size:1rem;flex-shrink:0}
.hs-item-info{display:flex;flex-direction:column;gap:1px;min-width:0}
.hs-item-name{font-family:'Barlow Condensed';font-size:.88rem;letter-spacing:.07em;color:var(--white)}
.hs-item-desc{font-family:'Barlow';font-size:.7rem;font-weight:300;color:var(--silver);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-divider{height:1px;background:var(--border);margin:8px 12px;flex-shrink:0}
.sb-specs{padding:10px 18px 18px;overflow-y:auto}
.spec-row{margin-bottom:10px}
.spec-k{font-family:'Barlow Condensed';font-size:.65rem;letter-spacing:.18em;color:var(--silver)}
.spec-v{font-family:'Barlow Condensed';font-size:.9rem;color:var(--white)}

/* CONTROLS */
#ct{grid-area:ct;display:flex;align-items:center;justify-content:center;gap:18px;padding:0 24px;background:rgba(8,12,18,.98);border-top:1px solid rgba(0,212,255,.08)}
.ctrl{background:none;border:1px solid rgba(0,212,255,.22);color:var(--silver);padding:7px 16px;font-family:'Barlow Condensed';font-size:.78rem;letter-spacing:.1em;cursor:pointer;transition:.2s}
.ctrl:hover,.ctrl.on{border-color:var(--accent);color:var(--accent)}
.ctrl-sw{display:flex;align-items:center;gap:8px;font-family:'Barlow Condensed';font-size:.74rem;letter-spacing:.09em;color:var(--silver)}
input[type=range]{width:72px;accent-color:var(--accent)}
.ctrl-hint{font-family:'Barlow Condensed';font-size:.7rem;letter-spacing:.09em;color:rgba(143,168,194,.3)}

/* LIGHTBOX */
#lb{position:fixed;inset:0;background:rgba(4,6,10,.94);display:none;align-items:center;justify-content:center;z-index:20}
#lb.open{display:flex}
.lb-card{width:660px;max-width:96vw;border:1px solid rgba(0,212,255,.3);background:#080c12;display:flex;flex-direction:column}
.lb-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border)}
.lb-icon{font-size:1.3rem}
.lb-name{font-family:'Bebas Neue';font-size:1.1rem;letter-spacing:.14em;color:var(--accent);flex:1;margin-left:10px}
.lb-x{background:none;border:none;color:var(--silver);font-size:1.3rem;cursor:pointer;transition:.2s;line-height:1}.lb-x:hover{color:var(--accent)}
.lb-3d{position:relative;height:280px;background:#040609;flex-shrink:0}
#lb-canvas{width:100%;height:100%;display:block}
.lb-body{padding:18px 20px;display:grid;grid-template-columns:1fr auto;gap:16px;align-items:start}
.lb-desc{font-family:'Barlow';font-weight:300;font-size:.88rem;line-height:1.75;color:var(--silver)}
.lb-details{display:flex;flex-direction:column;gap:8px;border-left:1px solid var(--border);padding-left:16px;min-width:150px}
.lb-detail-row{display:flex;flex-direction:column;gap:2px}
.lb-detail-k{font-family:'Barlow Condensed';font-size:.62rem;letter-spacing:.17em;color:rgba(143,168,194,.55)}
.lb-detail-v{font-family:'Barlow Condensed';font-size:.85rem;color:var(--white)}

/* ── MOBILE ──────────────────────────────────────────────────────── */
@media (max-width: 768px) {
  /* Full vertical layout: topbar → 3D canvas → controls → sidebar as bottom sheet */
  #app {
    grid-template-columns: 1fr;
    grid-template-rows: 52px 1fr 56px;
    grid-template-areas:
      "tb"
      "vw"
      "ct";
    height: 100dvh;
  }

  /* Top bar compact */
  #tb { padding: 0 14px; }
  .logo { font-size: 1.2rem; letter-spacing: .1em; }
  .tb-sub { display: none; }
  .tb-name { font-size: 1rem; }
  .back-btn { padding: 5px 10px; font-size: .72rem; letter-spacing: .08em; }

  /* 3D viewer fills most of screen */
  #vw { position: relative; }

  /* Sidebar hidden off-screen, toggled via button */
  #sb {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 55vh;
    z-index: 30;
    border-left: none;
    border-top: 1px solid var(--border);
    border-radius: 14px 14px 0 0;
    transform: translateY(100%);
    transition: transform .35s cubic-bezier(.4,0,.2,1);
    background: rgba(6,10,18,.98);
  }
  #sb.open { transform: translateY(0); }

  /* Drag handle on sidebar */
  #sb::before {
    content: '';
    display: block;
    width: 36px; height: 4px;
    background: rgba(0,212,255,.3);
    border-radius: 2px;
    margin: 10px auto 6px;
    flex-shrink: 0;
  }

  /* Controls bar: show sidebar toggle */
  #ct {
    gap: 10px; padding: 0 14px;
    justify-content: space-between;
  }
  .ctrl-hint { display: none; }
  .ctrl-sw   { gap: 5px; }
  .ctrl-sw label { display: none; }
  input[type=range] { width: 60px; }

  /* Lightbox full screen on mobile */
  .lb-card {
    width: 100vw; max-width: 100vw;
    height: 100dvh; border-radius: 0;
    border: none;
  }
  .lb-3d { height: 200px; }
  .lb-body {
    grid-template-columns: 1fr;
    overflow-y: auto;
  }
  .lb-details {
    border-left: none;
    border-top: 1px solid var(--border);
    padding-left: 0; padding-top: 12px;
    min-width: unset;
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }

  /* Show close button in sidebar */
  #btn-sb-close { display: block !important; }

  /* Hotspots bigger touch targets */
  .hs-dot  { width: 44px; height: 44px; }
  .hs-ring { width: 44px; height: 44px; font-size: 1.1rem; }
  /* Show label always on mobile (no hover) */
  .hs-tip  { opacity: 1; font-size: .68rem; padding: 3px 8px; }
}

@media (max-width: 400px) {
  .tb-name { font-size: .85rem; }
  .lb-details { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div id="app">
  <div id="tb">
    <div class="logo">OceanVast</div>
    <div class="tb-ship">
      <div class="tb-name" id="tb-name">—</div>
      <div class="tb-sub" id="tb-sub">VISUALIZADOR 3D</div>
    </div>
    <a class="back-btn" href="index.html">← FROTA</a>
  </div>

  <div id="vw">
    <canvas id="canvas"></canvas>
    <div id="loading">
      <div class="load-lbl">A CARREGAR MODELO 3D</div>
      <div id="prog-bar"><div id="prog-fill"></div></div>
      <div id="load-pct">0%</div>
    </div>
    <div id="hs-layer"></div>
  </div>

  <div id="sb">
    <div class="sb-head" style="position:relative">
      <button id="btn-sb-close" onclick="document.getElementById('sb').classList.remove('open')" style="display:none;position:absolute;top:0;right:12px;background:none;border:none;color:rgba(122,154,184,.6);font-size:1.2rem;cursor:pointer;padding:4px 8px;line-height:1" title="Fechar">✕</button>
      <div class="sb-title">PONTOS DE INTERESSE</div>
      <div class="sb-count" id="sb-count">A carregar...</div>
    </div>
    <div id="hs-list"></div>
    <div class="sb-divider"></div>
    <div class="sb-specs" id="sb-specs"></div>
  </div>

  <div id="ct">
    <button class="ctrl" id="btn-sb" onclick="toggleSidebar()">☰ INFO</button>
    <button class="ctrl on" id="btn-rot" onclick="toggleRot()">⟳ AUTO</button>
    <button class="ctrl" onclick="resetCam()">⌖ CENTRAR</button>
    <div class="ctrl-sw">VEL <input type="range" id="speed" min="1" max="10" value="4"></div>
    <div class="ctrl-hint">ARRASTAR · SCROLL · ESPAÇO</div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lb">
  <div class="lb-card">
    <div class="lb-head">
      <span class="lb-icon" id="lb-icon"></span>
      <span class="lb-name" id="lb-name"></span>
      <button class="lb-x" onclick="closeLB()">✕</button>
    </div>
    <div class="lb-3d"><canvas id="lb-canvas"></canvas></div>
    <div class="lb-body">
      <div class="lb-desc" id="lb-desc"></div>
      <div class="lb-details" id="lb-details"></div>
    </div>
  </div>
</div>

<script type="module">
import * as THREE from './three.module.js';
import { OBJLoader } from './OBJLoader.module.js';
import { MTLLoader } from './MTLLoader.module.js';

// ── INIT: get ship param from URL ─────────────────────────────────
const params  = new URLSearchParams(location.search);
const folder  = params.get('ship') || 'ship1';
let shipData  = null;
let shipGroup = null;

async function init() {
  const resp = await fetch('/api/ships');
  const all  = await resp.json();
  shipData = all.find(s => s._folder === folder) || all[0];
  if (!shipData) { document.getElementById('load-pct').textContent = 'Nenhum navio encontrado'; return; }

  document.title = shipData.name + ' — OceanVast';
  document.getElementById('tb-name').textContent = shipData.name.toUpperCase();
  document.getElementById('tb-sub').textContent  = (shipData.subtitle || 'VISUALIZADOR 3D').toUpperCase();
  buildSidebar(shipData);
  startScene(shipData);
}

// ── SIDEBAR ───────────────────────────────────────────────────────
function buildSidebar(ship) {
  const hs = ship.hotspots || [];
  document.getElementById('sb-count').textContent = hs.length + ' pontos';

  const list = document.getElementById('hs-list');
  list.innerHTML = '';
  hs.forEach(h => {
    const el = document.createElement('div');
    el.className = 'hs-item';
    el.id = 'hsi-' + h.id;
    el.innerHTML = `<span class="hs-item-icon">${h.icon||'●'}</span>
      <div class="hs-item-info">
        <div class="hs-item-name">${h.name}</div>
        <div class="hs-item-desc">${h.description||''}</div>
      </div>`;
    el.addEventListener('click', () => openLB(h));
    list.appendChild(el);
  });

  const specs = document.getElementById('sb-specs');
  specs.innerHTML = Object.entries(ship.specs || {}).map(([k,v]) =>
    `<div class="spec-row"><div class="spec-k">${k.toUpperCase()}</div><div class="spec-v">${v}</div></div>`
  ).join('');
}

// ── SCENE ─────────────────────────────────────────────────────────
const canvas   = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.setClearColor(0x080c12);

const scene  = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x080c12, 0.0032);

let camera, camYaw = 0, camPitch, camRadius, camTarget;

function startScene(ship) {
  const m = ship.model || {};
  camRadius = m.cameraRadius || 200;
  camTarget = new THREE.Vector3(...(m.cameraTarget || [0, 22, 0]));
  camPitch  = m.cameraPitch || 0.28;

  camera = new THREE.PerspectiveCamera(45, 1, 0.5, 3000);
  updateCam();

  // Lights
  scene.add(new THREE.AmbientLight(0x304060, 1.8));
  const sun = new THREE.DirectionalLight(0xfff4d6, 2.8);
  sun.position.set(80,120,60); sun.castShadow = true;
  sun.shadow.mapSize.set(2048,2048);
  sun.shadow.camera.left = sun.shadow.camera.bottom = -200;
  sun.shadow.camera.right = sun.shadow.camera.top = 200;
  scene.add(sun);
  const fill = new THREE.DirectionalLight(0x2060a0, 0.9);
  fill.position.set(-80,30,-60); scene.add(fill);
  const rim = new THREE.DirectionalLight(0x00d4ff, 0.35);
  rim.position.set(0,-20,-120); scene.add(rim);

  // Water
  const wg = new THREE.PlaneGeometry(800,800,40,40);
  const wm = new THREE.MeshStandardMaterial({color:0x063060,roughness:0.3,metalness:0.4,transparent:true,opacity:0.86});
  const water = new THREE.Mesh(wg, wm);
  water.rotation.x = -Math.PI/2; water.receiveShadow = true; scene.add(water);

  // Ship group
  shipGroup = new THREE.Group();
  if (m.rotationOffset) shipGroup.rotation.y = m.rotationOffset;
  scene.add(shipGroup);

  loadModel(ship);
  resize();
  loop(water);
}

function setProg(pct, txt) {
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('load-pct').textContent = txt || (pct + '%');
}

function fixMats(obj) {
  obj.traverse(c => {
    if (!c.isMesh) return;
    const ms = Array.isArray(c.material) ? c.material : [c.material];
    ms.forEach(m => { m.transparent=false; m.opacity=1; m.depthWrite=true; m.depthTest=true; m.needsUpdate=true; });
    c.castShadow = true; c.receiveShadow = true;
  });
}

function placeShip(obj) {
  fixMats(obj);
  const box = new THREE.Box3().setFromObject(obj);
  const cen = box.getCenter(new THREE.Vector3());
  obj.position.set(-cen.x, -box.min.y, -cen.z);
  shipGroup.add(obj);
  setTimeout(() => document.getElementById('loading').classList.add('hidden'), 400);
  buildHotspotDots();
}

function loadModel(ship) {
  const m = ship.model || {};
  const obj = m.obj || 'model.obj';
  const mtl = m.mtl;

  if (mtl) {
    setProg(5, 'Materiais...');
    const ml = new MTLLoader(); ml.setPath(`/${folder}/`);
    ml.load(mtl, mats => {
      setProg(30, 'Geometria...');
      mats.preload();
      const ol = new OBJLoader(); ol.setMaterials(mats); ol.setPath(`/${folder}/`);
      ol.load(obj, o => { setProg(98, 'Pronto'); placeShip(o); },
        x => { if(x.total) setProg(30+x.loaded/x.total*65, Math.round(x.loaded/x.total*100)+'%'); },
        () => loadFallback(obj));
    }, null, () => loadFallback(obj));
  } else {
    loadFallback(obj);
  }
}

function loadFallback(objFile) {
  setProg(35, 'Cores padrão...');
  const ol = new OBJLoader(); ol.setPath(`/${folder}/`);
  const pal = [0xd0d8e0,0x2a3a4a,0x8090a0,0xc03030,0x505860,0x203040,0xa0b0c0];
  ol.load(objFile || 'model.obj', o => {
    let i = 0;
    o.traverse(c => { if(c.isMesh) c.material = new THREE.MeshStandardMaterial({color:pal[i++%pal.length],roughness:.55,metalness:.3}); });
    placeShip(o);
  }, x => { if(x.total) setProg(35+x.loaded/x.total*55, Math.round(x.loaded/x.total*100)+'%'); });
}

// ── CAMERA ────────────────────────────────────────────────────────
function updateCam() {
  if (!camera) return;
  camera.position.set(
    camTarget.x + camRadius * Math.sin(camYaw) * Math.cos(camPitch),
    camTarget.y + camRadius * Math.sin(camPitch),
    camTarget.z + camRadius * Math.cos(camYaw) * Math.cos(camPitch)
  );
  camera.lookAt(camTarget);
}
window.resetCam = () => { camYaw=0; const m=shipData?.model||{}; camPitch=m.cameraPitch||0.28; camRadius=m.cameraRadius||200; updateCam(); };

let drag=false, lx=0, ly=0;
canvas.addEventListener('mousedown', e => { drag=true; lx=e.clientX; ly=e.clientY; });
window.addEventListener('mouseup', () => drag=false);
window.addEventListener('mousemove', e => {
  if(!drag)return;
  camYaw  -= (e.clientX-lx)*0.006;
  camPitch = Math.max(-0.1, Math.min(1.35, camPitch+(e.clientY-ly)*0.004));
  lx=e.clientX; ly=e.clientY; updateCam();
});
canvas.addEventListener('wheel', e => {
  camRadius = Math.max(40, Math.min(800, camRadius+e.deltaY*.3));
  updateCam(); e.preventDefault();
}, { passive:false });
let pinchDist0 = null;

function getTouchDist(e) {
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  return Math.sqrt(dx*dx + dy*dy);
}

canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    drag = true; lx = e.touches[0].clientX; ly = e.touches[0].clientY;
    pinchDist0 = null;
  } else if (e.touches.length === 2) {
    drag = false;
    pinchDist0 = getTouchDist(e);
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', e => {
  if (e.touches.length < 2) pinchDist0 = null;
  if (e.touches.length === 0) drag = false;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault(); // stops browser zoom
  if (e.touches.length === 2) {
    const dist = getTouchDist(e);
    if (pinchDist0 !== null) {
      camRadius = Math.max(40, Math.min(800, camRadius + (pinchDist0 - dist) * 0.5));
      updateCam();
    }
    pinchDist0 = dist;
    drag = false;
  } else if (drag && e.touches.length === 1) {
    camYaw   -= (e.touches[0].clientX - lx) * 0.006;
    camPitch  = Math.max(-0.1, Math.min(1.35, camPitch + (e.touches[0].clientY - ly) * 0.004));
    lx = e.touches[0].clientX; ly = e.touches[0].clientY;
    updateCam();
  }
}, { passive: false });

// ── AUTO ROTATE ───────────────────────────────────────────────────
let autoRot = true;
window.toggleRot = () => { autoRot=!autoRot; document.getElementById('btn-rot').classList.toggle('on',autoRot); };
window.addEventListener('keydown', e => {
  if(e.code==='Space'){e.preventDefault();window.toggleRot();}
  if(e.key==='Escape') window.closeLB();
});

// ── HOTSPOT DOTS ──────────────────────────────────────────────────
const hsLayer = document.getElementById('hs-layer');

function buildHotspotDots() {
  if (!shipData?.hotspots) return;
  hsLayer.innerHTML = '';
  shipData.hotspots.forEach(hs => {
    const color = hs.color || '#00d4ff';
    const dot = document.createElement('div');
    dot.className = 'hs-dot'; dot.id = 'hsd-' + hs.id;
    dot.innerHTML = `
      <div class="hs-ring" style="border-color:${color};background:${color}18">${hs.icon||'●'}</div>
      <div class="hs-tip" style="color:${color};border-color:${color}55">${hs.name}</div>`;
    dot.addEventListener('click', () => openLB(hs));
    hsLayer.appendChild(dot);
  });
}

function updateHotspots() {
  if (!shipData?.hotspots || !camera) return;
  const vw = canvas.clientWidth, vh = canvas.clientHeight;
  shipData.hotspots.forEach(hs => {
    const dot = document.getElementById('hsd-' + hs.id);
    if (!dot || !shipGroup) return;
    const wp = new THREE.Vector3(hs.position.x, hs.position.y, hs.position.z);
    shipGroup.localToWorld(wp);
    const p = wp.clone().project(camera);
    if (p.z >= 1) { dot.style.display='none'; return; }
    const sx = (p.x*.5+.5)*vw, sy = (-p.y*.5+.5)*vh;
    if (sx<-30||sx>vw+30||sy<-30||sy>vh+30) { dot.style.display='none'; return; }
    dot.style.display='block'; dot.style.left=sx+'px'; dot.style.top=sy+'px';
  });
}

// ── LIGHTBOX ─────────────────────────────────────────────────────
let lbR=null, lbAnim=null;

window.openLB = hs => {
  document.getElementById('lb-icon').textContent = hs.icon||'';
  document.getElementById('lb-name').textContent = hs.name.toUpperCase();
  document.getElementById('lb-desc').textContent = hs.description||'';
  const detailsEl = document.getElementById('lb-details');
  detailsEl.innerHTML = (hs.details||[]).map(d =>
    `<div class="lb-detail-row"><div class="lb-detail-k">${d.label}</div><div class="lb-detail-v">${d.value}</div></div>`
  ).join('');

  document.querySelectorAll('.hs-item').forEach(e=>e.classList.remove('active'));
  document.getElementById('hsi-'+hs.id)?.classList.add('active');
  document.getElementById('lb').classList.add('open');

  // Mini 3D scene
  if(lbAnim) cancelAnimationFrame(lbAnim);
  if(lbR) { lbR.dispose(); lbR=null; }

  const lc = document.getElementById('lb-canvas');
  lbR = new THREE.WebGLRenderer({canvas:lc,antialias:true});
  lbR.setPixelRatio(Math.min(devicePixelRatio,2));
  lbR.toneMapping = THREE.ACESFilmicToneMapping;
  lbR.toneMappingExposure = 1.3;
  lbR.setClearColor(0x040609);

  const ls = new THREE.Scene();
  const lc2 = new THREE.PerspectiveCamera(40,1,.1,3000);
  ls.add(new THREE.AmbientLight(0x304060,2.2));
  const ld=new THREE.DirectionalLight(0xffffff,3.5);
  ld.position.set(hs.position.x+60,hs.position.y+80,hs.position.z+60); ls.add(ld);

  if (shipGroup?.children.length>0) {
    const cl = shipGroup.children[0].clone(true); ls.add(cl);
    const focus = new THREE.Vector3(hs.position.x, hs.position.y, hs.position.z);
    const color = hs.color || '#00d4ff';
    const marker = new THREE.Mesh(
      new THREE.SphereGeometry(1.6,16,16),
      new THREE.MeshBasicMaterial({color:new THREE.Color(color),transparent:true,opacity:.85})
    );
    marker.position.copy(focus); ls.add(marker);

    // Orbit ring gizmo
    const ring = new THREE.Mesh(
      new THREE.TorusGeometry(3,0.15,8,32),
      new THREE.MeshBasicMaterial({color:new THREE.Color(color),transparent:true,opacity:.4})
    );
    ring.position.copy(focus); ls.add(ring);

    const r = shipData?.model?.cameraRadius ? shipData.model.cameraRadius * 0.35 : 70;
    let a = 0;
    const tick = () => {
      lbAnim = requestAnimationFrame(tick);
      a += 0.007;
      lc2.position.set(focus.x+r*Math.sin(a), focus.y+r*.38, focus.z+r*Math.cos(a));
      lc2.lookAt(focus);
      lc2.aspect = lc.clientWidth/lc.clientHeight;
      lc2.updateProjectionMatrix();
      marker.material.opacity = .4 + .5*Math.sin(Date.now()*.004);
      ring.rotation.y += 0.01;
      lbR.setSize(lc.clientWidth,lc.clientHeight,false);
      lbR.render(ls,lc2);
    };
    tick();
  }
};

window.closeLB = () => {
  document.getElementById('lb').classList.remove('open');
  if(lbAnim){cancelAnimationFrame(lbAnim);lbAnim=null;}
  if(lbR){lbR.dispose();lbR=null;}
  document.querySelectorAll('.hs-item').forEach(e=>e.classList.remove('active'));
};
document.getElementById('lb').addEventListener('click', e => { if(e.target===document.getElementById('lb')) window.closeLB(); });

// ── RESIZE + RENDER LOOP ──────────────────────────────────────────
function resize() {
  if(!camera)return;
  const w=canvas.clientWidth,h=canvas.clientHeight;
  camera.aspect=w/h; camera.updateProjectionMatrix();
  renderer.setSize(w,h,false);
}
window.addEventListener('resize',resize);

let t=0;
function loop(water) {
  requestAnimationFrame(()=>loop(water));
  t+=0.001;
  if(autoRot && shipGroup) {
    const m = shipData?.model||{};
    shipGroup.rotation.y = (m.rotationOffset||0) + t * (+document.getElementById('speed').value||4) * 0.3;
  }
  if(water){
    const pos=water.geometry.attributes.position;
    for(let i=0;i<pos.count;i++){
      pos.setY(i,Math.sin(pos.getX(i)*.04+t*2)*.5+Math.sin(pos.getZ(i)*.065+t*1.5)*.33);
    }
    pos.needsUpdate=true; water.geometry.computeVertexNormals();
  }
  updateHotspots();
  if(camera) renderer.render(scene,camera);
}

init();

// Mobile sidebar toggle
window.toggleSidebar = () => {
  const sb = document.getElementById('sb');
  sb.classList.toggle('open');
};
// Close sidebar when clicking lightbox open
const origOpenLB = window.openLB;
window.openLB = hs => {
  document.getElementById('sb')?.classList.remove('open');
  origOpenLB(hs);
};

</script>
